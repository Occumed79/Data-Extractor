services:
  - type: web
    name: provider-data-portal-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: provider-data-portal-db
          property: connectionString
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FIRECRAWL_API_KEY
        sync: false
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 app:app

databases:
  - name: provider-data-portal-db
    databaseName: provider_portal
    user: provider_portal
    plan: basic-256mb
